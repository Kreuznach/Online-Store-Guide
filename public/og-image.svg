<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 630" width="1200" height="630">
  <!-- Background gradient -->
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#1e40af;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#2563eb;stop-opacity:1" />
    </linearGradient>
  </defs>
  <rect width="1200" height="630" fill="url(#bg)"/>

  <!-- Pattern overlay -->
  <rect width="1200" height="630" fill="none" opacity="0.05"
    stroke="#ffffff" stroke-width="0"/>

  <!-- Main title -->
  <text x="600" y="220" text-anchor="middle" font-family="sans-serif"
    font-size="60" font-weight="800" fill="#ffffff">
    스마트스토어·통신판매업
  </text>
  <text x="600" y="300" text-anchor="middle" font-family="sans-serif"
    font-size="60" font-weight="800" fill="#ffffff">
    창업 준비 체크
  </text>

  <!-- Subtitle -->
  <text x="600" y="375" text-anchor="middle" font-family="sans-serif"
    font-size="26" fill="rgba(255,255,255,0.8)">
    사업자등록 · 통신판매업 신고 · 소비자보호
  </text>
  <text x="600" y="415" text-anchor="middle" font-family="sans-serif"
    font-size="22" fill="rgba(255,255,255,0.65)">
    공식 출처 기반 정보성 안내 서비스
  </text>

  <!-- Badge -->
  <rect x="460" y="475" width="280" height="44" rx="22"
    fill="rgba(255,255,255,0.15)" stroke="rgba(255,255,255,0.3)" stroke-width="1.5"/>
  <text x="600" y="503" text-anchor="middle" font-family="sans-serif"
    font-size="18" font-weight="600" fill="#ffffff">
    법률·세무 자문 아님 · 공식 출처 확인 안내
  </text>
</svg>
